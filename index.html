<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태릉고 매점 실시간 혼잡도</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .time-info {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 25px;
            padding: 8px;
            background-color: #edf2f7;
            border-radius: 8px;
            display: inline-block;
        }

        /* 혼잡도 카드 스타일 */
        .status-card {
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* 상태별 색상 디자인 */
        .status-smooth {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }
        .status-normal {
            background-color: #fffde7;
            color: #f57f17;
            border: 2px solid #fff59d;
        }
        .status-crowded {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ffcdd2;
        }

        .status-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .status-desc {
            font-size: 1.1rem;
        }

        .data-details {
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #3498db;
            margin-bottom: 25px;
        }

        .data-details p {
            margin-bottom: 6px;
        }
        .data-details p:last-child {
            margin-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: #2980b9;
        }

        /* 수동 선택 영역 스타일 */
        .search-section {
            border-top: 1px dashed #bdc3c7;
            padding-top: 25px;
            text-align: left;
        }

        .search-section h3 {
            font-size: 1.1rem;
            color: #34495e;
            margin-bottom: 12px;
            text-align: center;
        }

        .select-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
            cursor: pointer;
        }

        .btn-search {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏪 태릉고 매점 실시간 혼잡도</h1>
        <div class="time-info" id="current-time-display">시간 계산 중...</div>

        <div id="status-box" class="status-card status-smooth">
            <div class="status-title" id="status-text">계산 중</div>
            <div class="status-desc" id="status-desc">데이터를 불러오는 중입니다.</div>
        </div>

        <div class="data-details">
            <p>📊 <span id="info-period">현재 교시</span> 쉬는시간 기준</p>
            <p>👥 예상 방문 학생 수: <span id="predicted-count" class="highlight">0</span>명</p>
        </div>

        <div class="search-section">
            <h3>🔍 다른 시간대 조회하기</h3>
            <div class="select-box">
                <select id="select-day" onchange="updatePeriodOptions()">
                    <option value="월요일">월요일</option>
                    <option value="화요일">화요일</option>
                    <option value="수요일">수요일</option>
                    <option value="목요일">목요일</option>
                    <option value="금요일">금요일</option>
                </select>
                <select id="select-period">
                    </select>
            </div>
            <button class="btn-search" onclick="checkSelectedPeriod()">조회하기</button>
        </div>

        <footer>* 본 정보는 요일/교시별 평균 예측 데이터 기반입니다.</footer>
    </div>

    <script>
        // 1. 학교 실제 운영 기준 데이터 정의
        const timetableData = {
            "월요일": [30, 55, 50, 30, 25, 35, 0],    // 6교시 후 하교 (총 7개)
            "화요일": [35, 55, 55, 35, 30, 40, 0],    // 6교시 후 하교 (총 7개)
            "수요일": [30, 45, 45, 40, 30, 35, 20, 0], // 7교시 후 하교 (총 8개)
            "목요일": [30, 45, 45, 55, 30, 30, 65, 0], // 7교시 후 하교 (총 8개)
            "금요일": [35, 45, 60, 40, 25, 20, 0]     // 6교시 후 하교 (총 7개)
        };

        // 2. 요일 선택에 따라 교시 선택창(Dropdown) 옵션을 동적으로 바꿔주는 함수
        function updatePeriodOptions() {
            const daySelect = document.getElementById('select-day').value;
            const periodSelect = document.getElementById('select-period');
            
            periodSelect.innerHTML = "";

            const options = [
                { text: "0교시 (아침시간)", value: 0 },
                { text: "1교시 쉬는시간", value: 1 },
                { text: "2교시 쉬는시간", value: 2 },
                { text: "3교시 쉬는시간", value: 3 },
                { text: "4교시 (점심시간)", value: 4 },
                { text: "5교시 쉬는시간", value: 5 },
                { text: "6교시 쉬는시간", value: 6 }
            ];

            if (daySelect === "수요일" || daySelect === "목요일") {
                options.push({ text: "7교시 쉬는시간", value: 7 });
            }

            options.forEach(opt => {
                const el = document.createElement('option');
                el.textContent = opt.text;
                el.value = opt.value;
                periodSelect.appendChild(el);
            });
        }

        // 3. 실시간 시간표 매칭 함수
        function getCurrentPeriod(hours, minutes, currentDayStr) {
            const timeInMinutes = hours * 60 + minutes;

            if (timeInMinutes >= 960) {
                return { name: "영업 종료 시간", index: -2 };
            }

            if (timeInMinutes >= 480 && timeInMinutes < 500) return { name: "0교시(아침시간)", index: 0 };
            
            if (timeInMinutes >= 500 && timeInMinutes < 550) return { name: "1교시", index: 1 };
            if (timeInMinutes >= 550 && timeInMinutes < 600) return { name: "2교시", index: 2 };
            if (timeInMinutes >= 600 && timeInMinutes < 650) return { name: "3교시", index: 3 }; 
            if (timeInMinutes >= 650 && timeInMinutes < 700) return { name: "4교시", index: 4 }; 
            if (timeInMinutes >= 700 && timeInMinutes < 800) return { name: "5교시(점심시간)", index: 5 };
            if (timeInMinutes >= 800 && timeInMinutes < 850) return { name: "6교시", index: 6 };
            
            if ((currentDayStr === "수요일" || currentDayStr === "목요일") && timeInMinutes >= 900 && timeInMinutes < 960) {
                return { name: "7교시", index: 7 };
            }

            return { name: "정규 수업 외 시간", index: -1 };
        }

        // 4. 실시간 분석 및 화면 업데이트 함수
        function updateCongestion() {
            const now = new Date();
            const weekDays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
            const currentDayStr = weekDays[now.getDay()]; 
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            const timeStr = `${currentDayStr} ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            document.getElementById('current-time-display').innerText = `현재 시각: ${timeStr}`;

            if (currentDayStr === "토요일" || currentDayStr === "일요일") {
                showStatus("영업 종료", "주말에는 매점을 운영하지 않습니다.", 0, "status-smooth", "주말");
                return;
            }

            const periodInfo = getCurrentPeriod(hours, minutes, currentDayStr);
            
            if (periodInfo.index === -2) {
                showStatus("영업 종료", "오후 4시 이후 매점 영업이 종료되었습니다. 🚪", 0, "status-smooth", "영업 종료 시간");
                return;
            }
            
            if (periodInfo.index === -1) {
                showStatus("운영 외", "현재는 정규 쉬는시간이 아닙니다.", 0, "status-smooth", "기타 시간");
                return;
            }

            const dayData = timetableData[currentDayStr];
            const predictedCount = dayData[periodInfo.index];

            calculateAndShow(predictedCount, `${currentDayStr} ${periodInfo.name}`);
        }

        // 5. 사용자가 선택한 요일/교시 조회 함수
        function checkSelectedPeriod() {
            const selectedDay = document.getElementById('select-day').value;
            const selectedIndex = parseInt(document.getElementById('select-period').value);
            const selectElement = document.getElementById('select-period');
            
            if(selectElement.options.length === 0) return; 
            
            const periodName = selectElement.options[selectElement.selectedIndex].text;
            const dayData = timetableData[selectedDay];
            const predictedCount = dayData[selectedIndex];

            document.getElementById('current-time-display').innerText = `🔍 선택 조회: ${selectedDay} ${periodName}`;
            calculateAndShow(predictedCount, `${selectedDay} ${periodName.split(' ')[0]}`);
        }

        // 6. 점수 계산 및 테마 변경 함수
        function calculateAndShow(count, label) {
            let statusText = "";
            let statusDesc = "";
            let statusClass = "";

            if (count === 0) {
                statusText = "영업 종료";
                statusDesc = "수업이 종료되어 하교 시간 혹은 운영 외 시간입니다. 🚪";
                statusClass = "status-smooth";
            } else if (count <= 20) {
                statusText = "여 유";
                statusDesc = "매점이 한산합니다. 편하게 이용하세요! 🟢";
                statusClass = "status-smooth";
            } else if (count <= 50) {
                statusText = "보 통";
                statusDesc = "사람들이 조금 있을 수 있습니다. 🟡";
                statusClass = "status-normal";
            } else {
                statusText = "혼 잡";
                statusDesc = "사람이 많아 혼잡합니다. 다음 시간에 방문하는 것은 어떨까요? 🔴";
                statusClass = "status-crowded";
            }

            showStatus(statusText, statusDesc, count, statusClass, label);
        }

        function showStatus(text, desc, count, className, periodName) {
            const statusBox = document.getElementById('status-box');
            statusBox.className = `status-card ${className}`;
            
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-desc').innerText = desc;
            document.getElementById('predicted-count').innerText = count;
            document.getElementById('info-period').innerText = periodName;
        }

        // 🚀 [수정 핵심] 안전한 즉시 실행 구조로 변경
        // HTML 문서의 body를 브라우저가 다 그리는 즉시 아래 두 함수가 무조건 실행됩니다.
        updatePeriodOptions(); 
        updateCongestion();   
    </script>
</body>
</html>
