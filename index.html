<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태릉고 매점 실시간 혼잡도</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .time-info {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 25px;
            padding: 8px;
            background-color: #edf2f7;
            border-radius: 8px;
            display: inline-block;
        }

        /* 혼잡도 카드 스타일 */
        .status-card {
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* 상태별 색상 디자인 */
        .status-smooth {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }
        .status-normal {
            background-color: #fffde7;
            color: #f57f17;
            border: 2px solid #fff59d;
        }
        .status-crowded {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ffcdd2;
        }

        .status-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .status-desc {
            font-size: 1.1rem;
        }

        .data-details {
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #3498db;
            margin-bottom: 25px;
        }

        .data-details p {
            margin-bottom: 6px;
        }
        .data-details p:last-child {
            margin-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: #2980b9;
        }

        /* 수동 선택 영역 스타일 */
        .search-section {
            border-top: 1px dashed #bdc3c7;
            padding-top: 25px;
            text-align: left;
        }

        .search-section h3 {
            font-size: 1.1rem;
            color: #34495e;
            margin-bottom: 12px;
            text-align: center;
        }

        .select-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
            cursor: pointer;
        }

        .btn-search {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏪 태릉고 매점 실시간 혼잡도</h1>
        <div class="time-info" id="current-time-display">시간 계산 중...</div>

        <div id="status-box" class="status-card status-smooth">
            <div class="status-title" id="status-text">계산 중</div>
            <div class="status-desc" id="status-desc">데이터를 불러오는 중입니다.</div>
        </div>

        <div class="data-details">
            <p>📊 <span id="info-period">현재 교시</span> 쉬는시간 기준</p>
            <p>👥 예상 방문 학생 수: <span id="predicted-count" class="highlight">0</span>명</p>
        </div>

        <div class="search-section">
            <h3>🔍 다른 시간대 조회하기</h3>
            <div class="select-box">
                <select id="select-day" onchange="updatePeriodOptions()">
                    <option value="월요일">월요일</option>
                    <option value="화요일">화요일</option>
                    <option value="수요일">수요일</option>
                    <option value="목요일">목요일</option>
                    <option value="금요일">금요일</option>
                </select>
                <select id="select-period">
                    </select>
            </div>
            <button class="btn-search" onclick="checkSelectedPeriod()">조회하기</button>
        </div>

        <footer>* 본 정보는 요일/교시별 평균 예측 데이터 기반입니다.</footer>
    </div>
